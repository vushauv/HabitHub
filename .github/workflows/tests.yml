name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
  workflow_dispatch:
    inputs:
      runBackendTests:
        description: 'Run Backend Tests?'
        required: true
        default: 'Only if files changed'
        type: choice
        options:
          - 'Only if files changed'
          - 'Yes'
          #- 'Yes + Coverage Report'
      runFrontendTests:
        description: 'Run Frontend Tests?'
        required: true
        default: 'Only if files changed'
        type: choice
        options:
          - 'Only if files changed'
          - 'Yes'
          - 'Yes + Coverage Report'

jobs:
  check-for-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      backend-unit: ${{ steps.changes.outputs.backend-unit }}
      backend-integration: ${{ steps.changes.outputs.backend-integration }}
      frontend-unit: ${{ steps.changes.outputs.frontend-unit }}
      frontend-integration: ${{ steps.changes.outputs.frontend-integration }}
    steps:
      - uses: actions/checkout@v4
      - name: Paths Changes Filter
        uses: dorny/paths-filter@v4.0.1
        id: changes
        with:
          filters: |
            backend-unit:
              - '.github/workflows/tests.yml'
              - 'backend/**'
            backend-integration:
              - '.github/workflows/tests.yml'
              - 'backend/**'
              - 'docker-compose.test.yml'
            frontend-unit:
              - '.github/workflows/tests.yml'
              - 'frontend/**'
            frontend-integration:
              - '.github/workflows/tests.yml'
              - 'frontend/**'

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend-unit == 'true' || inputs.runBackendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-
      - name: Run
        run: dotnet test backend/backend.Tests/backend.Tests.csproj --filter "Category=Unit" --logger "console;verbosity=normal"

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend-integration == 'true' || inputs.runBackendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: ~/.docker-image-cache
          key: docker-images-${{ hashFiles('docker-compose.test.yml') }}
          restore-keys: docker-images-
      - name: Load cached images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in ~/.docker-image-cache/*.tar; do docker load -i "$f"; done
      - name: Pull and save images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.docker-image-cache
          docker compose -f docker-compose.test.yml pull postgres-test backend-integration-test
          docker save postgres:16-alpine -o ~/.docker-image-cache/postgres.tar
          docker save mcr.microsoft.com/dotnet/sdk:8.0 -o ~/.docker-image-cache/dotnet-sdk.tar
      - name: Run
        run: docker compose -f docker-compose.test.yml run --rm backend-integration-test
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.frontend-unit == 'true' || inputs.runFrontendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests/unit
        working-directory: frontend

  frontend-integration:
    name: Frontend Integration Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.frontend-integration == 'true' || inputs.runFrontendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests/integration
        working-directory: frontend
  
  frontend-coverage:
    name: Generate frontend coverage report
    runs-on: ubuntu-latest
    needs:
      - frontend-unit
      - frontend-integration
    if: |-
      needs.frontend-unit.result == 'success' &&
      needs.frontend-integration.result == 'success' &&
      inputs.runFrontendTests == 'Yes + Coverage Report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests --coverage
        working-directory: frontend
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage