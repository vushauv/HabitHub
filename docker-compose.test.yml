services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: habithub_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend-unit-test:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    volumes:
      - ./backend:/src/backend
    command: >
      dotnet test backend/backend.Tests/backend.Tests.csproj
      --filter "Category=Unit"
      --logger "console;verbosity=normal"

  backend-integration-test:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    volumes:
      - ./backend:/src/backend
    depends_on:
      postgres-test:
        condition: service_healthy
    command: >
      dotnet test backend/backend.Tests/backend.Tests.csproj
      --filter "Category=Integration"
      --logger "console;verbosity=normal"

  frontend-test:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_test_node_modules:/app/node_modules
    command: sh -c "npm ci && npm test"

volumes:
  frontend_test_node_modules:
