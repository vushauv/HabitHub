name: Tests

on:
  push:
  pull_request:

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-
      - name: Run
        run: dotnet test backend/backend.Tests/backend.Tests.csproj --filter "Category=Unit" --logger "console;verbosity=normal"

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run
        run: docker compose -f docker-compose.test.yml run --rm backend-integration-test
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests/unit
        working-directory: frontend

  frontend-integration:
    name: Frontend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests/integration
        working-directory: frontend
