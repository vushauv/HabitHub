name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
  workflow_dispatch:
    inputs:
      runBackendTests:
        description: 'Run Backend Tests?'
        required: true
        default: 'Only if files changed'
        type: choice
        options:
          - 'Only if files changed'
          - 'Yes'
          - 'Yes + Coverage Report'
      runFrontendTests:
        description: 'Run Frontend Tests?'
        required: true
        default: 'Only if files changed'
        type: choice
        options:
          - 'Only if files changed'
          - 'Yes'
          - 'Yes + Coverage Report'

jobs:
  check-for-changes:
    name: Check For Changes
    runs-on: ubuntu-latest
    outputs:
      backend-unit: ${{ steps.changes.outputs.backend-unit }}
      backend-integration: ${{ steps.changes.outputs.backend-integration }}
      frontend-unit: ${{ steps.changes.outputs.frontend-unit }}
      frontend-integration: ${{ steps.changes.outputs.frontend-integration }}
    steps:
      - uses: actions/checkout@v4
      - name: Paths Changes Filter
        uses: dorny/paths-filter@v4.0.1
        id: changes
        with:
          filters: |
            backend-unit:
              - '.github/workflows/tests.yml'
              - 'backend/**'
            backend-integration:
              - '.github/workflows/tests.yml'
              - 'backend/**'
              - 'docker-compose.test.yml'
            frontend-unit:
              - '.github/workflows/tests.yml'
              - 'frontend/**'
            frontend-integration:
              - '.github/workflows/tests.yml'
              - 'frontend/**'

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend-unit == 'true' || inputs.runBackendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-
      - name: Run
        run: dotnet test backend/backend.Tests/backend.Tests.csproj --filter "Category=Unit" --logger "console;verbosity=normal"

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.backend-integration == 'true' || inputs.runBackendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: ~/.docker-image-cache
          key: docker-images-${{ hashFiles('docker-compose.test.yml') }}
          restore-keys: docker-images-
      - name: Load cached images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in ~/.docker-image-cache/*.tar; do docker load -i "$f"; done
      - name: Pull and save images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.docker-image-cache
          docker compose -f docker-compose.test.yml pull postgres-test backend-integration-test
          docker save postgres:16-alpine -o ~/.docker-image-cache/postgres.tar
          docker save mcr.microsoft.com/dotnet/sdk:8.0 -o ~/.docker-image-cache/dotnet-sdk.tar
      - name: Run
        run: docker compose -f docker-compose.test.yml run --rm backend-integration-test
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
  
  backend-coverage:
    name: Generate Backend Coverage Report
    runs-on: ubuntu-latest
    needs:
      - backend-unit
      - backend-integration
    if: |-
      needs.backend-unit.result == 'success' &&
      needs.backend-integration.result == 'success' &&
      inputs.runBackendTests == 'Yes + Coverage Report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: ~/.docker-image-cache
          key: docker-images-${{ hashFiles('docker-compose.test.yml') }}
          restore-keys: docker-images-
      - name: Load cached images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in ~/.docker-image-cache/*.tar; do docker load -i "$f"; done
      - name: Pull and save images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.docker-image-cache
          docker compose -f docker-compose.test.yml pull postgres-test backend-integration-test
          docker save postgres:16-alpine -o ~/.docker-image-cache/postgres.tar
          docker save mcr.microsoft.com/dotnet/sdk:8.0 -o ~/.docker-image-cache/dotnet-sdk.tar
      - name: Run
        run: docker compose -f docker-compose.test.yml run --rm backend-test-coverage
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
      - name: Generate Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: 'backend/backend.Tests/TestResults/*/coverage.cobertura.xml' # REQUIRED # The coverage reports that should be parsed (separated by semicolon). Globbing is supported.
          targetdir: 'coveragereport' # REQUIRED # The directory where the generated report should be saved.
          reporttypes: 'Html;MarkdownSummaryGithub' # The output formats and scope (separated by semicolon) Values: Badges, Clover, Cobertura, OpenCover, CsvSummary, Html, Html_Dark, Html_Light, Html_BlueRed, HtmlChart, HtmlInline, HtmlInline_AzurePipelines, HtmlInline_AzurePipelines_Dark, HtmlInline_AzurePipelines_Light, HtmlSummary, Html_BlueRed_Summary, JsonSummary, CodeClimate, Latex, LatexSummary, lcov, Markdown, MarkdownSummary, MarkdownAssembliesSummary, MarkdownSummaryGithub, MarkdownDeltaSummary, MHtml, SvgChart, SonarQube, TeamCitySummary, TextSummary, TextDeltaSummary, Xml, XmlSummary, cjson
          sourcedirs: 'backend' # Optional directories which contain the corresponding source code (separated by semicolon). The source directories are used if coverage report contains classes without path information.
          verbosity: 'Info' # The verbosity level of the log messages. Values: Verbose, Info, Warning, Error, Off
          tag: '${{ github.run_number }}_${{ github.run_id }}' # Optional tag or build version.
          toolpath: 'reportgeneratortool' # Default directory for installing the dotnet tool.

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report # Artifact name        
          path: coveragereport # Directory containing files to upload
          
      - name: Publish coverage in build summary # Only applicable if 'MarkdownSummaryGithub' or one of the other Markdown report types is generated
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY # Adjust path and filename if necessary
        shell: bash

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.frontend-unit == 'true' || inputs.runFrontendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests/unit
        working-directory: frontend

  frontend-integration:
    name: Frontend Integration Tests
    runs-on: ubuntu-latest
    needs: check-for-changes
    if: needs.check-for-changes.outputs.frontend-integration == 'true' || inputs.runFrontendTests != 'Only if files changed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests/integration
        working-directory: frontend
  
  frontend-coverage:
    name: Generate Frontend Coverage Report
    runs-on: ubuntu-latest
    needs:
      - frontend-unit
      - frontend-integration
    if: |-
      needs.frontend-unit.result == 'success' &&
      needs.frontend-integration.result == 'success' &&
      inputs.runFrontendTests == 'Yes + Coverage Report'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Run
        run: npx vitest run tests --coverage
        working-directory: frontend
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage
