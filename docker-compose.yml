services:
  postgres:
    image: postgres:16-alpine
    container_name: habithub-postgres
    environment:
      POSTGRES_DB: ${BACKEND__POSTGRESDB}
      POSTGRES_USER: ${BACKEND__POSTGRESUSER}
      POSTGRES_PASSWORD: ${BACKEND__POSTGRESPASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-54320}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - habithub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BACKEND__POSTGRESUSER}"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: habithub-backend
    ports:
      - "${BACKEND__APPPORT:-5000}:5000"
    env_file:
      - .env
    environment:
      BACKEND__POSTGRESHOST: postgres
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    volumes:
      - ./backend:/src
    working_dir: /src
    command: dotnet watch run --no-launch-profile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - habithub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: habithub-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - habithub-network

volumes:
  frontend_node_modules:
  postgres_data:

networks:
  habithub-network:
    driver: bridge
